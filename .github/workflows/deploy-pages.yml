name: Deploy Mainz Map to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build Mainz outputs
        run: uv run mainz-chargers --output-dir output

      - name: Prepare site artifact
        run: |
          mkdir -p site
          cp output/mainz_map.html site/index.html
          cp output/mainz_map.html site/mainz_map.html
          cp output/mainz_stats.json site/mainz_stats.json
          cp output/mainz_stations.csv site/mainz_stations.csv

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
